server:
  port: 8083

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:paymentdb}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: payment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.vivaeventos.*"

# Pasarela de pagos (Wompi sandbox por defecto para Colombia - R-04)
payment:
  gateway:
    provider: wompi
    base-url: ${PAYMENT_GATEWAY_URL:https://sandbox.wompi.co/v1}
    public-key: ${PAYMENT_PUBLIC_KEY}
    private-key: ${PAYMENT_PRIVATE_KEY}
    webhook-secret: ${PAYMENT_WEBHOOK_SECRET}
    timeout-seconds: 30

resilience4j:
  circuitbreaker:
    instances:
      payment-gateway:
        sliding-window-size: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.vivaeventos.paymentservice: DEBUG

kafka:
  topics:
    payment-initiated: payment.initiated    # Escucha
    payment-confirmed: payment.confirmed    # Publica
    payment-failed: payment.failed          # Publica
    payment-pending: payment.pending        # Publica
